upstream femboyz_api {
    server 127.0.0.1:3000;
}

upstream femboyz_web {
    server 127.0.0.1:3001;
}

server {
    listen 80;
    listen [::]:80;
    server_name example.com;

    client_max_body_size 0;

    location ^~ /api/ {
        proxy_pass http://femboyz_api;
        proxy_http_version 1.1;
        proxy_request_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /ping {
        proxy_pass http://femboyz_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ "^/[0-9]{3}[0-9A-Z][A-Z]{4}$" {
        error_page 418 = @upload_json;
        if ($http_accept ~* "application/json") { return 418; }

        proxy_pass http://femboyz_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @upload_json {
        proxy_pass http://femboyz_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ "^/[0-9]{3}[0-9A-Z][A-Z]{4}/[0-9]+$" {
        proxy_pass http://femboyz_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://femboyz_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
